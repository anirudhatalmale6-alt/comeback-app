name: iOS Build & TestFlight

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      KEYCHAIN_PATH: ci_keychain.keychain-db
      KEYCHAIN_PASSWORD: ci_password

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install fastlane
        run: gem install fastlane

      - name: Setup signing
        run: |
          KEY_PATH="$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8"
          mkdir -p "$HOME/private_keys"
          echo '${{ secrets.APP_STORE_CONNECT_KEY }}' > "$KEY_PATH"

          python3 -c "
          import json
          with open('$KEY_PATH') as f:
              key_content = f.read()
          data = {
              'key_id': '${{ secrets.APP_STORE_KEY_ID }}',
              'issuer_id': '${{ secrets.APP_STORE_ISSUER_ID }}',
              'key': key_content,
              'in_house': False
          }
          with open('/tmp/api_key.json', 'w') as f:
              json.dump(data, f)
          "

          KC="$HOME/Library/Keychains/$KEYCHAIN_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC" login.keychain-db
          security default-keychain -s "$KC"

      - name: Revoke orphaned certificates
        run: |
          ruby -e '
            require "spaceship"
            key = Spaceship::ConnectAPI::Token.from_json_file("/tmp/api_key.json")
            Spaceship::ConnectAPI.token = key
            certs = Spaceship::ConnectAPI::Certificate.all
            certs.each do |cert|
              if cert.certificate_type == "DISTRIBUTION" || cert.certificate_type == "IOS_DISTRIBUTION"
                puts "Revoking: #{cert.id} (#{cert.display_name})"
                cert.delete!
              end
            end
          '
        continue-on-error: true

      - name: Get certificate & profile
        run: |
          KC="$HOME/Library/Keychains/$KEYCHAIN_PATH"

          fastlane run get_certificates \
            api_key_path:"/tmp/api_key.json" \
            keychain_path:"$KC" \
            keychain_password:"$KEYCHAIN_PASSWORD" \
            platform:"ios"

          fastlane run get_provisioning_profile \
            api_key_path:"/tmp/api_key.json" \
            app_identifier:"com.comeback.app" \
            platform:"ios" \
            output_path:"/tmp/profiles"

          PROFILE_PATH=$(ls /tmp/profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            PROFILE_PATH=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | tail -1)
          fi
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" 2>/dev/null || true

          SIGN_ID=$(security find-identity -v -p codesigning "$KC" | grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGN_ID=$SIGN_ID" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"
          echo "Signing identity: $SIGN_ID"
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"

      - name: Configure manual signing
        run: |
          cd ios

          python3 << 'PYEOF'
          import re, os

          with open('Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()

          content = content.replace('CODE_SIGN_STYLE = Automatic', 'CODE_SIGN_STYLE = Manual')

          profile_name = os.environ['PROFILE_NAME']

          if 'PROVISIONING_PROFILE_SPECIFIER' not in content:
              content = content.replace(
                  'DEVELOPMENT_TEAM = UUKQ5CU4Q6;',
                  f'DEVELOPMENT_TEAM = UUKQ5CU4Q6;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile_name}";'
              )

          content = content.replace(
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "iPhone Developer"',
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution"'
          )

          if 'CODE_SIGN_IDENTITY = "Apple Distribution"' not in content:
              content = content.replace(
                  'DEVELOPMENT_TEAM = UUKQ5CU4Q6;',
                  'CODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tDEVELOPMENT_TEAM = UUKQ5CU4Q6;'
              )

          with open('Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)

          print("Project configured for manual signing")
          PYEOF

          python3 << PYEOF2
          import plistlib, os

          opts = {
              'method': 'app-store-connect',
              'teamID': 'UUKQ5CU4Q6',
              'signingStyle': 'manual',
              'uploadSymbols': True,
              'provisioningProfiles': {
                  'com.comeback.app': os.environ['PROFILE_NAME']
              }
          }

          with open('ExportOptions.plist', 'wb') as f:
              plistlib.dump(opts, f)

          print(f"ExportOptions configured with profile: {os.environ['PROFILE_NAME']}")
          PYEOF2

      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Verify archive contents
        run: |
          echo "=== App bundle frameworks ==="
          ls -la build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/ 2>/dev/null || echo "No Frameworks dir"
          echo ""
          echo "=== flutter_assets ==="
          ls build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/App.framework/ 2>/dev/null || echo "No App.framework"
          echo ""
          echo "=== IPA output ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "No IPA"
          echo ""
          echo "=== Check App.framework has AOT snapshot ==="
          file build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/App.framework/App 2>/dev/null || echo "App binary not found"

      - name: Upload to App Store Connect
        run: |
          python3 << 'PYEOF'
          import plistlib, os
          opts = {
              'method': 'app-store-connect',
              'destination': 'upload',
              'teamID': 'UUKQ5CU4Q6',
              'signingStyle': 'manual',
              'uploadSymbols': True,
              'provisioningProfiles': {
                  'com.comeback.app': os.environ['PROFILE_NAME']
              }
          }
          with open('/tmp/UploadOptions.plist', 'wb') as f:
              plistlib.dump(opts, f)
          PYEOF

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /tmp/UploadOptions.plist \
            -exportPath /tmp/upload \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8" \
            -authenticationKeyID ${{ secrets.APP_STORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_ISSUER_ID }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$HOME/Library/Keychains/$KEYCHAIN_PATH" || true
