name: iOS Build & TestFlight

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8

      - name: Install fastlane
        run: gem install fastlane

      - name: Setup keychain & signing
        run: |
          # Create a temporary keychain for CI
          security create-keychain -p "ci_password" ci_keychain.keychain-db
          security set-keychain-settings -lut 21600 ci_keychain.keychain-db
          security unlock-keychain -p "ci_password" ci_keychain.keychain-db
          security list-keychains -d user -s ci_keychain.keychain-db login.keychain-db

          # Create API key JSON for fastlane
          cat > /tmp/api_key.json << EOF
          {
            "key_id": "${{ secrets.APP_STORE_KEY_ID }}",
            "issuer_id": "${{ secrets.APP_STORE_ISSUER_ID }}",
            "key": "$(cat ~/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8 | tail -n +2 | head -n -1 | tr -d '\n')",
            "in_house": false
          }
          EOF

          # Create distribution certificate
          fastlane run create_keychain \
            name:"ci_keychain" \
            password:"ci_password" \
            unlock:true \
            timeout:21600 \
            add_to_search_list:true 2>/dev/null || true

          # Get or create distribution certificate
          fastlane run get_certificates \
            api_key_path:"/tmp/api_key.json" \
            keychain_path:"$(pwd)/ci_keychain.keychain-db" \
            keychain_password:"ci_password" \
            platform:"ios" \
            type:"appstore"

          # Get or create App Store provisioning profile
          fastlane run get_provisioning_profile \
            api_key_path:"/tmp/api_key.json" \
            app_identifier:"com.comeback.app" \
            platform:"ios" \
            type:"appstore"

      - name: Build Flutter iOS
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number=${{ github.run_number }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey ${{ secrets.APP_STORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_ISSUER_ID }}
        env:
          API_PRIVATE_KEYS_DIR: ~/private_keys

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comeback-ios
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore
