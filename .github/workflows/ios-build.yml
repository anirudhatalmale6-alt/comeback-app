name: iOS Build & TestFlight

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      KEYCHAIN_PATH: ci_keychain.keychain-db
      KEYCHAIN_PASSWORD: ci_password

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install fastlane
        run: gem install fastlane

      - name: Setup signing
        run: |
          KEY_PATH="$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8"
          mkdir -p "$HOME/private_keys"
          echo '${{ secrets.APP_STORE_CONNECT_KEY }}' > "$KEY_PATH"

          python3 -c "
          import json
          with open('$KEY_PATH') as f:
              key_content = f.read()
          data = {
              'key_id': '${{ secrets.APP_STORE_KEY_ID }}',
              'issuer_id': '${{ secrets.APP_STORE_ISSUER_ID }}',
              'key': key_content,
              'in_house': False
          }
          with open('/tmp/api_key.json', 'w') as f:
              json.dump(data, f)
          "

          KC="$HOME/Library/Keychains/$KEYCHAIN_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC" login.keychain-db
          security default-keychain -s "$KC"

      - name: Revoke orphaned certificates
        run: |
          ruby -e '
            require "spaceship"
            key = Spaceship::ConnectAPI::Token.from_json_file("/tmp/api_key.json")
            Spaceship::ConnectAPI.token = key
            certs = Spaceship::ConnectAPI::Certificate.all
            certs.each do |cert|
              if cert.certificate_type == "DISTRIBUTION" || cert.certificate_type == "IOS_DISTRIBUTION"
                puts "Revoking: #{cert.id} (#{cert.display_name})"
                cert.delete!
              end
            end
          '
        continue-on-error: true

      - name: Get certificate & profile
        run: |
          KC="$HOME/Library/Keychains/$KEYCHAIN_PATH"

          fastlane run get_certificates \
            api_key_path:"/tmp/api_key.json" \
            keychain_path:"$KC" \
            keychain_password:"$KEYCHAIN_PASSWORD" \
            platform:"ios"

          fastlane run get_provisioning_profile \
            api_key_path:"/tmp/api_key.json" \
            app_identifier:"com.comeback.app" \
            platform:"ios" \
            output_path:"/tmp/profiles"

          # Install profile and save identity info
          PROFILE_PATH=$(ls /tmp/profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -z "$PROFILE_PATH" ]; then
            PROFILE_PATH=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | tail -1)
          fi
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" 2>/dev/null || true

          # Get signing identity from keychain
          SIGN_ID=$(security find-identity -v -p codesigning "$KC" | grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGN_ID=$SIGN_ID" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"
          echo "Signing identity: $SIGN_ID"
          echo "Profile UUID: $PROFILE_UUID"

      - name: Build unsigned Flutter
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Archive unsigned
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Sign archive
        run: |
          APP="/tmp/Runner.xcarchive/Products/Applications/Runner.app"

          # Embed provisioning profile
          cp "$PROFILE_PATH" "$APP/embedded.mobileprovision"

          # Extract entitlements from profile
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          /usr/libexec/PlistBuddy -x -c "Print Entitlements" /tmp/profile.plist > /tmp/entitlements.plist

          # Sign all frameworks and dylibs
          find "$APP/Frameworks" -type d -name "*.framework" | while read fw; do
            codesign --force --sign "$SIGN_ID" --timestamp "$fw"
          done
          find "$APP/Frameworks" -name "*.dylib" | while read dylib; do
            codesign --force --sign "$SIGN_ID" --timestamp "$dylib"
          done

          # Sign app extensions if any
          find "$APP/PlugIns" -type d -name "*.appex" 2>/dev/null | while read ext; do
            codesign --force --sign "$SIGN_ID" --entitlements /tmp/entitlements.plist --timestamp "$ext"
          done

          # Sign the main app
          codesign --force --sign "$SIGN_ID" --entitlements /tmp/entitlements.plist --timestamp "$APP"

          echo "Signing complete. Verifying..."
          codesign --verify --deep --strict "$APP"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath /tmp/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8" \
            -authenticationKeyID ${{ secrets.APP_STORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_ISSUER_ID }}

      - name: Verify upload
        run: |
          echo "Build was uploaded to App Store Connect via xcodebuild -exportArchive"
          echo "Check App Store Connect > TestFlight for the new build"
          ls -la /tmp/ipa/ 2>/dev/null || echo "No local IPA (uploaded directly)"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$HOME/Library/Keychains/$KEYCHAIN_PATH" || true
