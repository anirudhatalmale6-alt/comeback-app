name: iOS Build & TestFlight

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      KEYCHAIN_PATH: ci_keychain.keychain-db
      KEYCHAIN_PASSWORD: ci_password

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup signing
        run: |
          KEY_PATH="$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8"
          mkdir -p "$HOME/private_keys"
          echo '${{ secrets.APP_STORE_CONNECT_KEY }}' > "$KEY_PATH"

          # Create API key JSON with properly escaped key content
          python3 -c "
          import json
          with open('$KEY_PATH') as f:
              key_content = f.read()
          data = {
              'key_id': '${{ secrets.APP_STORE_KEY_ID }}',
              'issuer_id': '${{ secrets.APP_STORE_ISSUER_ID }}',
              'key': key_content,
              'in_house': False
          }
          with open('/tmp/api_key.json', 'w') as f:
              json.dump(data, f)
          "

          # Setup keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          security set-keychain-settings -lut 21600 "$HOME/Library/Keychains/$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$HOME/Library/Keychains/$KEYCHAIN_PATH"
          security list-keychains -d user -s "$HOME/Library/Keychains/$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$HOME/Library/Keychains/$KEYCHAIN_PATH"

      - name: Install fastlane
        run: gem install fastlane

      - name: Get certificate & profile
        run: |
          KC="$HOME/Library/Keychains/$KEYCHAIN_PATH"

          # Get or create distribution certificate
          fastlane run get_certificates \
            api_key_path:"/tmp/api_key.json" \
            keychain_path:"$KC" \
            keychain_password:"$KEYCHAIN_PASSWORD" \
            platform:"ios"

          # Get or create App Store provisioning profile
          fastlane run get_provisioning_profile \
            api_key_path:"/tmp/api_key.json" \
            app_identifier:"com.comeback.app" \
            platform:"ios"

      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-number=${{ github.run_number }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey ${{ secrets.APP_STORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_ISSUER_ID }}
        env:
          API_PRIVATE_KEYS_DIR: ~/private_keys

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comeback-ios
          path: build/ios/ipa/*.ipa
          if-no-files-found: ignore

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$HOME/Library/Keychains/$KEYCHAIN_PATH" || true
