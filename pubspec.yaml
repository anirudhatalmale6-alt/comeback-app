name: comeback_app
description: Come Back - Nail Salon Management App
publish_to: 'none'
version: 1.6.27+80

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.1
  firebase_storage: ^12.4.1
  provider: ^6.1.2
  image_picker: ^1.1.2
  camera: ^0.12.0
  hand_landmarker: ^3.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  audioplayers: ^6.1.0
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.4
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/nail_designs/
